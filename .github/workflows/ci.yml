name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev libxerces-c-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake openssl xerces-c
          echo "OPENSSL_DIR=$(brew --prefix openssl)" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$(brew --prefix xerces-c):$(brew --prefix openssl)" >> $GITHUB_ENV

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          vcpkg install xerces-c:x64-windows openssl:x64-windows
        shell: cmd

      - name: Set vcpkg env (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "CMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake" >> $env:GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --features async

      - name: Test
        run: cargo test --features async

      - name: Clippy
        run: cargo clippy --features async -- -D warnings

      # openjpeg-sys vendors its C source (no system libs), so the openjpeg FFI
      # in openjpeg_encoder.rs compiles on every runner. This is the feature set
      # dcpwizard and imfwizard actually build with. grok-ffi is not covered: it
      # links libgrokj2k via pkg-config, which is not available on GitHub runners.
      - name: Build (openjpeg)
        run: cargo build --features "async openjpeg"

      - name: Test (openjpeg)
        run: cargo test --features "async openjpeg"

      - name: Clippy (openjpeg)
        run: cargo clippy --all-targets --features "async openjpeg" -- -D warnings

      - name: Format check
        run: cargo fmt -- --check
