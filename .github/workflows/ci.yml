name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev libxerces-c-dev xmlsec1 libxml2-utils

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake openssl xerces-c
          echo "OPENSSL_DIR=$(brew --prefix openssl)" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$(brew --prefix xerces-c):$(brew --prefix openssl)" >> $GITHUB_ENV

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          vcpkg install xerces-c:x64-windows openssl:x64-windows
        shell: cmd

      - name: Set vcpkg env (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "CMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake" >> $env:GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --features async

      - name: Test
        run: cargo test --features async

      - name: Clippy
        run: cargo clippy --features async -- -D warnings

      # build grok (jpeg 2000 codec) from source once per tag, cached.
      # provides libgrokj2k on the pkg-config + loader paths and grk_compress on PATH.
      - name: Cache grok
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/grok-install
          key: grok-${{ runner.os }}-v20.3.6

      - name: Setup grok
        if: runner.os != 'Windows'
        env:
          GROK_TAG: v20.3.6
        run: |
          prefix="$GITHUB_WORKSPACE/grok-install"
          if [ ! -x "$prefix/bin/grk_compress" ]; then
            git clone --depth 1 --branch "$GROK_TAG" \
              https://github.com/GrokImageCompression/grok.git "$RUNNER_TEMP/grok-src"
            cmake -S "$RUNNER_TEMP/grok-src" -B "$RUNNER_TEMP/grok-build" \
              -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$prefix"
            cmake --build "$RUNNER_TEMP/grok-build" --parallel
            cmake --install "$RUNNER_TEMP/grok-build"
          fi
          echo "PKG_CONFIG_PATH=$prefix/lib/pkgconfig:$prefix/lib64/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$prefix/lib:$prefix/lib64:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
          echo "DYLD_LIBRARY_PATH=$prefix/lib:$prefix/lib64:$DYLD_LIBRARY_PATH" >> "$GITHUB_ENV"
          echo "$prefix/bin" >> "$GITHUB_PATH"

      # grok-ffi links libgrokj2k (built above); skipped on windows where the
      # source build is not wired up.
      - name: Build (grok-ffi)
        if: runner.os != 'Windows'
        run: cargo build --features "async grok-ffi"

      - name: Test (grok-ffi)
        if: runner.os != 'Windows'
        run: cargo test --features "async grok-ffi"

      - name: Clippy (grok-ffi)
        if: runner.os != 'Windows'
        run: cargo clippy --all-targets --features "async grok-ffi" -- -D warnings

      - name: Format check
        run: cargo fmt -- --check
